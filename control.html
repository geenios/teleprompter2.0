<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter Control</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--panel:#141414;--panel-2:#1a1a1a;
  --text:#f0f0f0;--muted:#8a8a8a;--border:#2a2a2a;--accent:#ffc800;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',sans-serif;}

/* ── SAVE MODAL ── */
#saveModalInput:focus{border-color:var(--accent)!important;}

/* ── OPENING ── */
#openingPanel{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 24px;}
#openingPanel.hidden{display:none;}
.open-title{font-family:'EB Garamond',Garamond,serif;font-size:42px;font-weight:700;color:var(--text);text-align:center;line-height:1.1;letter-spacing:-.01em;}
.open-subtitle{font-size:13px;color:var(--muted);text-align:center;margin-top:2px;margin-bottom:6px;}
.open-actions{display:flex;gap:12px;}
.open-btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.open-btn.primary{background:var(--accent);color:#000;}
.open-btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
/* Combined QR + code box */
#codeBox{border:2px solid var(--accent);border-radius:14px;padding:20px 24px;background:var(--panel);display:flex;flex-direction:column;align-items:center;gap:14px;transition:opacity .35s,visibility .35s;}
#codeBox.faded{opacity:0;visibility:hidden;pointer-events:none;}
#codeBox canvas,#codeBox img{border-radius:6px;display:block;}
#hostCode{font-family:'Inter',sans-serif;font-size:40px;font-weight:700;letter-spacing:.2em;color:var(--accent);}
/* Connection indicator */
#connIndicator{display:flex;align-items:center;gap:10px;padding:12px 22px;border-radius:10px;border:2px solid;font-size:14px;font-weight:600;min-width:220px;justify-content:center;}
#connIndicator.conn-waiting{border-color:var(--accent);color:var(--accent);}
#connIndicator.conn-connected{border-color:#22c55e;color:#22c55e;}
#connIndicator.conn-error{border-color:#e55;color:#e55;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── QR MODAL ── */
#qrModal{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.82);align-items:center;justify-content:center;}
.qr-inner{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px 24px;text-align:center;display:flex;flex-direction:column;gap:14px;min-width:260px;}
.qr-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
#qrModalCode{font-family:"SF Mono","Courier New",monospace;font-size:40px;letter-spacing:.2em;color:var(--accent);border:2px solid var(--accent);border-radius:8px;padding:12px 18px;}
#qrModalCanvas img,#qrModalCanvas canvas{display:block;margin:0 auto;}
.qr-close{background:none;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;}

/* ── RECONNECT BANNER ── */
#reconnectBanner{display:none;position:absolute;top:36px;left:0;right:0;z-index:20;background:rgba(10,10,10,.97);border-bottom:1px solid var(--accent);padding:8px 18px;align-items:center;gap:12px;justify-content:center;}
#reconnectBanner.visible{display:flex;}
#reconnectBanner span{font-size:13px;color:var(--muted);}
.code-inline{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent);font-size:14px;letter-spacing:.08em;}
#dismissBanner{background:none;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:5px;font-size:12px;cursor:pointer;margin-left:auto;}

/* ── TAB BAR ── */
#tabBar{display:none;height:36px;background:var(--panel);border-bottom:1px solid var(--border);align-items:stretch;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#tabBar::-webkit-scrollbar{display:none;}
#tabBar.visible{display:flex;}
.tab{display:flex;align-items:center;gap:4px;padding:0 8px 0 12px;white-space:nowrap;font-size:13px;color:var(--muted);border-right:1px solid var(--border);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;flex-shrink:0;max-width:240px;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.tab-name{overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.tab-rename-btn,.tab-close{background:none;border:none;cursor:pointer;padding:2px 3px;font-size:13px;color:var(--muted);line-height:1;flex-shrink:0;}
.tab-rename-btn:hover{color:var(--accent);}
.tab-close:hover{color:#e55;}
#addTabBtn{padding:0 14px;color:var(--muted);font-size:18px;cursor:pointer;background:none;border:none;flex-shrink:0;border-right:1px solid var(--border);}
#addTabBtn:hover{color:var(--accent);}
.tab-session-area{display:flex;align-items:center;gap:6px;margin-left:auto;padding:0 10px;border-left:1px solid var(--border);}
.tab-session-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);height:26px;padding:0 12px;border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap;}
.tab-session-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-rename-input{background:var(--panel);border:1px solid var(--accent);color:var(--text);font-size:13px;padding:1px 6px;border-radius:4px;outline:none;width:120px;}
#fileInput{display:none;}

/* ── MAIN PANEL ── */
#mainPanel{display:none;position:relative;}
#mainPanel.visible{display:flex;flex-direction:row;height:calc(100vh - 36px);}
#editorPane{flex:0 0 56%;min-width:180px;overflow:hidden;display:flex;flex-direction:column;border-right:2px solid var(--accent);}
#dragHandle{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;z-index:5;}
#dragHandle:hover,#dragHandle.dragging{background:var(--accent);}
#sidePane{flex:1;min-width:180px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

/* ── TOOLBAR ── */
#toolbar{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tb-right{margin-left:auto;display:flex;gap:4px;align-items:center;}
#saveStatus{font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap;}
.tb-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:6px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0 10px;white-space:nowrap;}
.tb-btn.icon{width:28px;padding:0;}
.tb-btn.icon svg{width:13px;height:13px;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.mode{padding:0 16px;font-size:13px;}
.tb-btn.mode.active{border-color:var(--accent);color:var(--accent);}
.tb-sep{width:1px;background:var(--border);height:20px;margin:0 3px;flex-shrink:0;}

/* ── EDITOR AREA ── */
#editorArea{flex:1;display:flex;flex-direction:row;min-height:0;}
#editorStack{flex:1;position:relative;min-height:0;}
#highlightLayer,#textArea{position:absolute;inset:0;padding:16px;font-size:16px;line-height:1.6;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;white-space:pre-wrap;word-wrap:break-word;overflow-y:auto;box-sizing:border-box;}
#highlightLayer{color:transparent;background:var(--panel);border:1px solid transparent;pointer-events:none;z-index:1;scrollbar-width:none;}
#highlightLayer::-webkit-scrollbar{display:none;}
#textArea{background:transparent;color:var(--text);border:1px solid transparent;resize:none;outline:none;z-index:2;caret-color:var(--accent);scrollbar-width:none;}
#textArea::-webkit-scrollbar{display:none;}
#textArea:focus{border-color:var(--accent);}
.highlight-span{background:rgba(255,200,0,.75);border-radius:2px;}
#scrubberTrack{width:14px;background:var(--panel);border-left:1px solid var(--border);position:relative;flex-shrink:0;cursor:pointer;}
#scrubberThumb{position:absolute;left:2px;right:2px;min-height:24px;background:var(--accent);border-radius:5px;opacity:.85;cursor:grab;}
#scrubberThumb:active{cursor:grabbing;opacity:1;}

/* ── DIRECTOR VIEW ── */
#directorView{display:none;flex:1;min-height:0;overflow-y:auto;padding:8px 12px;flex-direction:column;background:var(--panel);scrollbar-width:none;}
#directorView.active{display:flex;}
#directorView::-webkit-scrollbar{display:none;}
.dv-section{padding:6px 0;border-bottom:1px solid var(--border);}
.dv-section:last-child{border-bottom:none;}
.dv-sentence-row{
  display:grid;grid-template-columns:22px 1fr;
  padding:3px 60px 3px 4px;/* right padding reserves space for abs button */
  border-radius:5px;position:relative;
}
.dv-sentence-row:hover{background:var(--panel-2);}
.dv-check{
  appearance:none;-webkit-appearance:none;
  width:14px;height:14px;margin-top:4px;flex-shrink:0;
  border:2px solid var(--accent);border-radius:2px;
  background:transparent;cursor:pointer;visibility:hidden;grid-row:1;
  position:relative;
}
.dv-check:checked{background:var(--accent);}
.dv-check:checked::after{
  content:'';position:absolute;left:2px;top:-1px;
  width:5px;height:9px;
  border:2px solid #000;border-top:none;border-left:none;
  transform:rotate(45deg);
}
.section-first .dv-check{visibility:visible;}
.dv-sent-text{font-size:14px;line-height:1.6;color:var(--text);cursor:pointer;display:block;grid-column:2;}
.dv-hl{background:rgba(255,200,0,.75);border-radius:2px;color:inherit;}
.dv-section.done .dv-sent-text{color:var(--muted);text-decoration:line-through;}
/* Add note: absolutely positioned so it never shifts layout */
.dv-add-note{
  position:absolute;right:6px;top:5px;
  display:none;background:none;border:none;
  color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;
}
.dv-sentence-row:hover .dv-add-note{display:block;}
/* Marker auto-pause button */
.dv-marker-btn{
  position:absolute;right:68px;top:5px;
  display:none;background:none;border:none;
  color:var(--muted);font-size:11px;cursor:pointer;
  padding:2px 5px;border-radius:3px;white-space:nowrap;
  line-height:1.4;
}
.dv-sentence-row:hover .dv-marker-btn{display:block;}
.dv-marker-btn.active{display:block;color:var(--accent);}
.dv-sentence-row.has-marker::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:var(--accent);pointer-events:none;
}
/* Widen row right padding to fit both abs buttons */
/* (overrides the 60px set on .dv-sentence-row) */
.dv-sentence-row{padding-right:110px;}
/* Section-pause mode: dividers become yellow */
.section-pause-on .dv-section:not(:last-child){border-bottom:1px solid var(--accent);}

/* Director toolbar */
#directorTools{display:none;align-items:center;gap:4px;margin-left:2px;}
.tb-btn.dv-active{background:rgba(255,200,0,.12);color:var(--accent);border-color:var(--accent);}
/* Director sub-controls: smaller, lighter */
.tb-btn.dv-ctrl{height:24px;font-size:11px;padding:0 9px;background:transparent;border-color:rgba(255,255,255,.15);color:var(--muted);}
.tb-btn.dv-ctrl:disabled{opacity:.3;cursor:default;}
.tb-btn.dv-ctrl.dv-active{background:rgba(255,200,0,.12);color:var(--accent);border-color:var(--accent);}
/* Mode buttons: keep standard height, add slight weight */
.tb-btn.mode{font-weight:600;}
.tb-btn:disabled{opacity:.35;cursor:default;}
/* Read time */
#readTimeEl{font-size:11px;color:var(--muted);}
.speed-label{display:flex;align-items:baseline;gap:8px;min-width:0;}

/* 2.0: Direct is the only view — hide the legacy Edit/Direct + undo/redo toolbar buttons */
#editorModeBtn,#directorModeBtn,#undoBtn,#redoBtn{display:none!important;}
/* Inline editor */
.dv-empty{color:var(--muted);font-size:14px;padding:24px;text-align:center;cursor:text;border:1px dashed var(--border);border-radius:8px;margin:8px;}
.dv-empty:hover{border-color:var(--accent);color:var(--text);}
.dv-editable{font-size:14px;line-height:1.6;color:var(--text);padding:6px 8px;outline:none;white-space:pre-wrap;word-wrap:break-word;min-height:1.6em;border-radius:6px;box-shadow:inset 0 0 0 1px var(--accent);background:rgba(255,200,0,.04);}
.dv-editable u{text-decoration:underline;}
.dv-editable.edit-all{min-height:70vh;box-shadow:none;background:none;padding:4px 4px 40vh;}
/* Selection formatting bubble */
.fmt-bubble{position:fixed;z-index:300;display:flex;align-items:center;gap:5px;background:#0c0c0c;border:1px solid var(--border);border-radius:8px;padding:5px 7px;box-shadow:0 6px 20px rgba(0,0,0,.55);}
.fmt-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:5px;min-width:26px;height:24px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fmt-btn:hover{border-color:var(--accent);color:var(--accent);}
.fmt-swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.35);cursor:pointer;padding:0;transition:transform .1s;}
.fmt-swatch:hover{transform:scale(1.15);border-color:#fff;}

/* Existing comment and input: span full width below sentence, in grid col 2 */
.dv-existing-comment{
  grid-column:2;font-size:12px;color:var(--muted);background:var(--panel-2);
  border-radius:5px;padding:5px 9px;margin-top:3px;border-left:2px solid var(--accent);
  line-height:1.4;cursor:pointer;
}
.dv-comment-input{
  grid-column:2;width:100%;font-size:12px;color:var(--text);background:var(--panel-2);
  border:1px solid var(--accent);border-radius:5px;padding:5px 9px;
  resize:none;outline:none;font-family:inherit;line-height:1.5;margin-top:3px;
}

/* ── SIDE PANE ── */
.label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;}
#monitor{background:#000;border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;margin:0 auto;}
#previewBox{width:100%;height:100%;overflow:hidden;position:relative;container-type:size;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
#previewBox.dragging{cursor:grabbing;}
#previewText{color:#fff;padding:60cqh 6%;white-space:pre-wrap;word-break:normal;overflow-wrap:break-word;word-wrap:break-word;line-height:1.5;user-select:none;}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0;}
.btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;}
.btn.active{border-color:var(--accent);color:var(--accent);}
.btn-row{display:flex;gap:8px;align-items:stretch;}
.icon-btn{flex:0 0 42px;width:42px;height:42px;padding:0;border-radius:12px;}
.icon-btn svg{width:20px;height:20px;}
.slider-row{display:flex;flex-direction:column;gap:5px;}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.val{font-size:13px;color:var(--accent);font-family:"SF Mono","Courier New",monospace;}
.slider-btns{display:flex;align-items:center;gap:6px;}
.slider-btns input{flex:1;accent-color:var(--accent);}
.step-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;}
.step-btn:active{border-color:var(--accent);color:var(--accent);}
.margin-dual{position:relative;height:28px;margin-top:2px;touch-action:none;}
.md-track{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);background:var(--panel-2);border:1px solid var(--border);border-radius:3px;}
.md-fill{position:absolute;top:50%;height:6px;transform:translateY(-50%);background:rgba(255,200,0,.28);border-radius:3px;pointer-events:none;}
.md-thumb{position:absolute;top:50%;width:16px;height:16px;transform:translate(-50%,-50%);background:var(--accent);border:2px solid var(--bg);border-radius:50%;cursor:grab;}
.md-thumb:active{cursor:grabbing;}
.preview-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.text-toggle{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;border-top:1px solid var(--border);padding:9px 2px 6px;margin-top:2px;cursor:pointer;}
.text-toggle .label{cursor:pointer;}
.text-toggle:hover .label,.text-toggle:hover #textChevron{color:var(--text);}
.text-toggle #textChevron{font-size:10px;color:var(--muted);}
#textSettings{display:flex;flex-direction:column;gap:10px;}
#textSettings.collapsed{display:none;}
.select-input{background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:14px;outline:none;width:100%;}
.select-input:focus{border-color:var(--accent);}
#statusBar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#sideStatus{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;}
#persistentCode{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:18px;font-weight:600;color:var(--accent);border:1px solid var(--border);border-radius:6px;padding:5px 12px;letter-spacing:.08em;cursor:pointer;transition:border-color .15s;}
#persistentCode:hover{border-color:var(--accent);}

/* ── INLINE RESTORE NOTICE ── */
#restoreNotice{display:none;align-items:center;gap:6px;font-size:11px;color:var(--text);background:var(--panel-2);border:1px solid var(--accent);border-radius:6px;padding:3px 8px;white-space:nowrap;}
#restoreNotice.visible{display:flex;}
.rn-btn{background:var(--accent);color:#000;border:none;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;}
.rn-dismiss{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;line-height:1;padding:0 2px;}
#autosaveStatus{font-size:11px;color:var(--muted);}
</style>
</head>
<body>


<!-- ── OPENING ── -->
<div id="openingPanel">
  <div class="open-title">Super Duper Teleprompter</div>
  <div class="open-subtitle">by Patrik Kedves</div>
  <div class="open-actions">
    <button class="open-btn primary" id="newProjectBtn">New project</button>
    <button class="open-btn secondary" id="loadProjectBtn">Load project</button>
    <input type="file" id="fileInput" accept=".json,.tpsession">
  </div>
  <div id="connIndicator" class="conn-waiting">
    <span class="conn-dot"></span>
    <span id="connText">Generating code…</span>
  </div>
  <div id="codeBox">
    <div id="qrCanvas"></div>
    <div id="hostCode">------</div>
  </div>
</div>

<!-- ── DELETE CONFIRM MODAL ── -->
<div id="deleteModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:center;justify-content:center;">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:320px;display:flex;flex-direction:column;gap:16px;">
    <div style="font-size:15px;font-weight:600;color:var(--text);">Delete script</div>
    <div id="deleteModalMsg" style="font-size:13px;color:var(--muted);"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="deleteModalCancel" style="background:none;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;">Cancel</button>
      <button id="deleteModalConfirm" style="background:#e55;border:none;color:#fff;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Delete</button>
    </div>
  </div>
</div>

<!-- ── SAVE SESSION MODAL ── -->
<div id="saveModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:center;justify-content:center;">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:340px;display:flex;flex-direction:column;gap:16px;">
    <div style="font-size:15px;font-weight:600;color:var(--text);">Save session as</div>
    <input id="saveModalInput" type="text" placeholder="session name"
      style="background:#000;border:2px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:15px;font-family:'Inter',sans-serif;outline:none;width:100%;">
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="saveModalCancel" style="background:none;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;">Cancel</button>
      <button id="saveModalConfirm" style="background:var(--accent);border:none;color:#000;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Save</button>
    </div>
  </div>
</div>

<!-- ── QR MODAL ── -->
<div id="qrModal">
  <div class="qr-inner">
    <div class="qr-title">Connect prompter</div>
    <div id="qrModalCanvas"></div>
    <div id="qrModalCode"></div>

// ── SESSION ───────────────────────────────────────────────
function defaultSession(tutorial=false){
  const id=uid();return{version:1,scripts:[{id,name:'Script 1',text:tutorial?TUTORIAL:''}],activeId:id,notes:{}};
}
function getActiveScript(){return session.scripts.find(s=>s.id===session.activeId)||session.scripts[0];}
function getNotesFor(id){return session.notes[id]||(session.notes[id]={});}
function persistSession(){
  getActiveScript().text=textArea.value;
  try{localStorage.setItem(SESSION_KEY,JSON.stringify(session));}catch(e){}
}
let _autosaveTimer=null;
function autosave(){
  getActiveScript().text=textArea.value;
  clearTimeout(_autosaveTimer);
  _autosaveTimer=setTimeout(()=>{

let session=(()=>{try{const r=localStorage.getItem(SESSION_KEY);if(r){const s=JSON.parse(r);if(s&&s.scripts)return s;}}catch(e){}return defaultSession(true);})();

// ── PROMPTER STATE ────────────────────────────────────────
let state={text:'',fontSize:96,fontFamily:'verdana',wpm:140,marginL:0,marginR:0,lineHeight:1.3,mirroredH:false,mirroredV:false,playState:'paused'};
function syncScript(){state.text=getActiveScript().text;state.marks=markList();}
syncScript();

// ── MODE ──────────────────────────────────────────────────
let uiMode='editor';

  uiMode=m;const dir=m==='director';
  if(directorToolsEl)directorToolsEl.style.display=dir?'flex':'none';
  undoBtn.style.display=dir?'none':'';

// ── PARSING ───────────────────────────────────────────────
function parseSentences(text,base){
  const r=[],re=/[^.!?\n]+(?:[.!?]+\s*)?/g;let m;
  while((m=re.exec(text))!==null){const t=m[0].trim();if(t.length>1)r.push({text:t,offset:base+m.index,len:m[0].length});}
  if(!r.length&&text.trim())r.push({text:text.trim(),offset:base,len:text.length});
  return r;
}
function getParagraphs(text){
  const r=[];let off=0;
  for(const part of text.split(/(\n{2,})/)){
    if(/^\n+$/.test(part)){off+=part.length;continue;}
    // Account for whitespace trimmed off the front, so offsets stay aligned to
    // the full text (otherwise section/marker positions drift by the lead length).
    const lead=part.length-part.replace(/^\s+/,'').length;
    const t=part.trim();
    if(t)r.push({text:t,offset:off+lead,sentences:parseSentences(t,off+lead)});
    off+=part.length;
  }
  return r;
}
let sentenceStarts=[0],sentenceIdx=0;
function buildSentenceStarts(text){
  const s=[0];const re=/[.!?]\s+|\n{2,}/g;let m;
  while((m=re.exec(text))!==null){const i=m.index+m[0].length;if(i<text.length&&/\S/.test(text[i]))s.push(i);}
  return s;
}
function jumpToSentence(idx){
  if(!sentenceStarts.length)return;
  idx=Math.max(0,Math.min(idx,sentenceStarts.length-1));
  sentenceIdx=idx;
  const total=state.text.length||1;
  const pct=lineSeekPct(sentenceStarts[idx]);
  scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
  textArea.scrollTop=(sentenceStarts[idx]/total)*textArea.scrollHeight;
  highlightLayer.scrollTop=textArea.scrollTop;
}

// ══ RICH TEXT 2.0 — typed marks {s,e,t,v}: t='u' underline | 'c' color (v=css color) ══
const FMT_COLORS=['#ffffff','#ffc800','#ff6b6b','#5cc8ff','#84e88a'];
function markList(){const s=getActiveScript();if(!s.marks)s.marks=[];return s.marks;}
function mergeMarks(marks){
  const groups={};
  marks.forEach(m=>{const k=m.t+'|'+(m.v||'');(groups[k]=groups[k]||[]).push(m);});
  const out=[];
  Object.values(groups).forEach(g=>{g.sort((a,b)=>a.s-b.s);let cur=null;g.forEach(m=>{if(cur&&m.s<=cur.e)cur.e=Math.max(cur.e,m.e);else{cur={...m};out.push(cur);}});});
  return out.sort((a,b)=>a.s-b.s);
}
// Build HTML for `text` (first char at global `base`), applying marks + optional highlight.
function richHtml(text,base,marks,hiS,hiE){
  const n=text.length,bounds=new Set([0,n]);
  const add=(gs,ge)=>{const ls=Math.max(0,gs-base),le=Math.min(n,ge-base);if(le>ls){bounds.add(ls);bounds.add(le);}};
  (marks||[]).forEach(m=>add(m.s,m.e));
  if(hiS!=null&&hiE!=null&&hiE>hiS)add(hiS,hiE);
  const bs=[...bounds].sort((a,b)=>a-b);let html='';
  for(let i=0;i<bs.length-1;i++){
    const a=bs[i],b=bs[i+1];if(b<=a)continue;const ga=base+a;
    const act=(marks||[]).filter(m=>m.s<=ga&&m.e>ga);
    const u=act.some(m=>m.t==='u');const col=act.filter(m=>m.t==='c').slice(-1)[0];
    const hi=hiS!=null&&hiE!=null&&hiS<=ga&&hiE>ga;
    let seg=escHtml(text.slice(a,b));
    if(u)seg='<u>'+seg+'</u>';
    if(col)seg='<span style="color:'+col.v+'">'+seg+'</span>';
    if(hi)seg='<mark class="dv-hl">'+seg+'</mark>';
    html+=seg;
  }
  return html;
}
// Serialize a contenteditable → {text, marks:[{s,e,t,v}]} (offsets local to this editor)
function serializeEditable(root){
  let text='';const marks=[];
  (function walk(node,u,color){
    node.childNodes.forEach(ch=>{
      if(ch.nodeType===Node.TEXT_NODE){
        const a=text.length,b=a+ch.nodeValue.length;
        if(b>a){if(u)marks.push({s:a,e:b,t:'u'});if(color)marks.push({s:a,e:b,t:'c',v:color});}
        text+=ch.nodeValue;
      }else if(ch.nodeType===Node.ELEMENT_NODE){
        const tag=ch.tagName;
        if(tag==='BR'){text+='\n';return;}
        let nu=u||tag==='U'||/underline/.test((ch.style&&ch.style.textDecoration)||'');
        let nc=color;
        if(ch.style&&ch.style.color)nc=ch.style.color;
        else if(ch.getAttribute&&ch.getAttribute('color'))nc=ch.getAttribute('color');
        const before=text.length;walk(ch,nu,nc);
        if((tag==='DIV'||tag==='P')&&text.length>before&&!text.endsWith('\n'))text+='\n';
      }
    });
  })(root,false,null);
  return{text:text.replace(/\n+$/,''),marks:mergeMarks(marks)};
}
// Apply an edited section back into the global script, shifting marks, then sync.
function applyEditedSection(secStart,secEnd,res){
  const old=state.text;
  const newText=old.slice(0,secStart)+res.text+old.slice(secEnd);
  const delta=res.text.length-(secEnd-secStart);
  const keep=[];
  markList().forEach(m=>{
    if(m.e<=secStart)keep.push(m);
    else if(m.s>=secEnd)keep.push({...m,s:m.s+delta,e:m.e+delta});
  });
  res.marks.forEach(m=>keep.push({...m,s:secStart+m.s,e:secStart+m.e}));
  getActiveScript().marks=mergeMarks(keep);
  const scr=getActiveScript();
  if(scr.markers)scr.markers=scr.markers.filter(o=>o<=secStart||o>=secEnd).map(o=>o>=secEnd?o+delta:o);
  applyTextChange(newText);
}
// Single funnel for a text change (keeps the hidden textarea buffer in sync).
function applyTextChange(v){
  textArea.value=v;getActiveScript().text=v;state.text=v;state.marks=markList();
  sentenceStarts=buildSentenceStarts(v);
  renderPreview();renderDirectorView();persistSession();autosave();updateReadTime();
  sendScriptText();sendSectionBreaks();sendSentenceMarkers();
}
function renderPreview(){previewText.innerHTML=richHtml(state.text,0,markList());}
function sendScriptText(){sendUpdate('text',state.text);sendUpdate('marks',markList());}

// ── SELECTION FORMATTING BUBBLE (Notion-style) ────────────
let fmtBubble=null;
function ensureBubble(){
  if(fmtBubble)return fmtBubble;
  fmtBubble=document.createElement('div');fmtBubble.className='fmt-bubble';fmtBubble.style.display='none';
  const u=document.createElement('button');u.className='fmt-btn';u.innerHTML='<u>U</u>';u.title='Underline';
  u.onmousedown=e=>e.preventDefault();u.onclick=()=>applyFmt('u');fmtBubble.appendChild(u);
  FMT_COLORS.forEach(c=>{const sw=document.createElement('button');sw.className='fmt-swatch';sw.style.background=c;sw.title=c;
    sw.onmousedown=e=>e.preventDefault();sw.onclick=()=>applyFmt('c',c);fmtBubble.appendChild(sw);});
  document.body.appendChild(fmtBubble);
  return fmtBubble;
}
function applyFmt(kind,val){
  if(kind==='u'){document.execCommand('underline');}
  else if(kind==='c'){try{document.execCommand('styleWithCSS',false,true);}catch(e){}document.execCommand('foreColor',false,val);}
  setTimeout(positionBubble,0);
}
function positionBubble(){
  if(!_editing&&!_editingAll){hideBubble();return;}
  const sel=getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){hideBubble();return;}
  const range=sel.getRangeAt(0);
  let node=range.commonAncestorContainer;node=node.nodeType===1?node:node.parentElement;
  if(!node||!node.closest('.dv-editable')){hideBubble();return;}
  const rect=range.getBoundingClientRect();
  if(!rect.width&&!rect.height){hideBubble();return;}
  const b=ensureBubble();b.style.display='flex';
  const bw=b.offsetWidth||170,bh=b.offsetHeight||30;
  let top=rect.top-bh-8,left=rect.left+rect.width/2-bw/2;
  if(top<4)top=rect.bottom+8;
  left=Math.max(6,Math.min(left,window.innerWidth-bw-6));
  b.style.top=top+'px';b.style.left=left+'px';
}
function hideBubble(){if(fmtBubble)fmtBubble.style.display='none';}
document.addEventListener('selectionchange',()=>{if(_editing||_editingAll)positionBubble();});

function placeCaretEnd(el){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=getSelection();s.removeAllRanges();s.addRange(r);}
function wireEditor(ed,commit){
  ed.addEventListener('paste',e=>{e.preventDefault();const t=(e.clipboardData||window.clipboardData).getData('text/plain');document.execCommand('insertText',false,t);});
  ed.addEventListener('keydown',e=>{
    if(e.key==='Escape'){e.preventDefault();commit(true);}
    else if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();commit(false);}
    else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='u'){e.preventDefault();applyFmt('u');}
    else if(e.key==='Enter'){
      // Insert a plain newline ourselves so paragraph breaks (blank line = \n\n)
      // are consistent and re-split into sections on commit, instead of relying
      // on the browser's <div>/<br> behaviour which can drop a break.
      e.preventDefault();document.execCommand('insertText',false,'\n');
    }
  });
  ed.addEventListener('mouseup',()=>setTimeout(positionBubble,0));
  ed.addEventListener('keyup',()=>setTimeout(positionBubble,0));
  ed.addEventListener('blur',()=>setTimeout(()=>{
    if(document.activeElement!==ed && !(fmtBubble&&fmtBubble.contains(document.activeElement))) commit(false);
  },150));
}

// ── INLINE SECTION EDITOR (no layout shift) ───────────────
let _editing=null;
function editSection(sectionEl,sec){
  if(_editing||_editingAll)return;
  const secStart=sec.offset,secEnd=sec.offset+sec.text.length;
  _editing={secStart,secEnd};
  const h=sectionEl.offsetHeight;                       // reserve height → sections below don't move
  const ed=document.createElement('div');ed.className='dv-editable section-edit';ed.contentEditable='true';ed.spellcheck=false;
  if(h)ed.style.minHeight=h+'px';
  ed.innerHTML=richHtml(sec.text,sec.offset,markList())||'<br>';
  sectionEl.replaceWith(ed);ed.focus();placeCaretEnd(ed);
  let done=false;
  const commit=cancel=>{if(done)return;done=true;_editing=null;hideBubble();
    if(cancel){renderDirectorView();return;}
    applyEditedSection(secStart,secEnd,serializeEditable(ed));
  };
  wireEditor(ed,commit);
}

// ── EDIT-ALL / IMPORT (whole script in one editor) ────────
let _editingAll=false,_editAllCommit=null;
function toggleEditAll(){
  if(_editingAll){if(_editAllCommit)_editAllCommit(false);return;}
  if(_editing)return;
  _editingAll=true;editAllBtn.classList.add('dv-active');
  directorView.innerHTML='';
  const ed=document.createElement('div');ed.className='dv-editable edit-all';ed.contentEditable='true';ed.spellcheck=false;
  ed.innerHTML=state.text.trim()?richHtml(state.text,0,markList()):'<br>';
  directorView.appendChild(ed);ed.focus();placeCaretEnd(ed);

// ── DIRECTOR VIEW ─────────────────────────────────────────
let _dvPrevStart=-1, _dvLastRow=null, _sentClickTimer=null;
function renderDirectorView(){
  const scr=getActiveScript(),notes=getNotesFor(scr.id),secs=getParagraphs(scr.text);
  directorView.innerHTML='';
  if(!secs.length){
    const empty=document.createElement('div');
    empty.className='dv-empty';
    empty.textContent='Double-click to write your script…';
    empty.addEventListener('dblclick',()=>editSection(empty,{offset:0,text:''}));
    directorView.appendChild(empty);return;
  }
  secs.forEach((sec,sIdx)=>{
    const sNote=notes[`s_${sIdx}`]||{};
    const div=document.createElement('div');
    div.className='dv-section'+(sNote.checked?' done':'');
    div.addEventListener('dblclick',e=>{clearTimeout(_sentClickTimer);if(!_editing){e.preventDefault();editSection(div,sec);}});
    const sentsEl=document.createElement('div');
    sec.sentences.forEach((sent,sentIdx)=>{
      const key=`${sIdx}_${sentIdx}`;
      const sn=notes[`sent_${key}`]||{};
      const row=document.createElement('div');
      row.className='dv-sentence-row'+(sentIdx===0?' section-first':'');
      row.dataset.start=sent.offset;row.dataset.end=sent.offset+sent.len;row.dataset.raw=sent.text;
      // Checkbox (only visible on first row via CSS)
      const cb=document.createElement('input');
      cb.type='checkbox';cb.className='dv-check';cb.checked=!!sNote.checked;
      cb.addEventListener('change',e=>{
        e.stopPropagation();
        notes[`s_${sIdx}`]={...(notes[`s_${sIdx}`]||{}),checked:cb.checked};
        persistSession();div.classList.toggle('done',cb.checked);
        div.querySelectorAll('.dv-check').forEach(c=>c.checked=cb.checked);
      });
      row.appendChild(cb);
      // Sentence text
      const textEl=document.createElement('span');
      textEl.className='dv-sent-text';textEl.innerHTML=richHtml(sent.text,sent.offset,markList());
      textEl.onclick=e=>{
        if(e.detail>1)return; // ignore the click half of a double-click (which opens edit)
        const off=sent.offset;
        clearTimeout(_sentClickTimer);
        // delay the jump so a following double-click can cancel it (no jump-scroll → no shift)
        _sentClickTimer=setTimeout(()=>{
          const pct=lineSeekPct(off);
          scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
        },210);
      };
      row.appendChild(textEl);
      // Marker auto-pause button (keyed on END of sentence, fires after sentence plays)
      const mkrs=getActiveScript().markers||[];
      const sentEnd=sent.offset+sent.len;
      const hasMk=mkrs.includes(sentEnd);
      if(hasMk)row.classList.add('has-marker');
      const mBtn=document.createElement('button');
      mBtn.className='dv-marker-btn'+(hasMk?' active':'');
      mBtn.title=hasMk?'Remove auto-pause':'Pause after this sentence';
      mBtn.textContent='⏸';
      mBtn.onclick=e=>{
        e.stopPropagation();
        const scr=getActiveScript();
        if(!scr.markers)scr.markers=[];
        const mi=scr.markers.indexOf(sentEnd);
        if(mi===-1)scr.markers.push(sentEnd);
        else scr.markers.splice(mi,1);
        persistSession();sendSentenceMarkers();renderDirectorView();
      };
      row.appendChild(mBtn);
      // + Add note (abs positioned, no layout shift)
      const addBtn=document.createElement('button');
      addBtn.className='dv-add-note';addBtn.textContent='+ Add note';
      addBtn.onclick=e=>{e.stopPropagation();openComment(row,key,notes);};
      row.appendChild(addBtn);
      // Existing comment
      if(sn.text){
        const bubble=document.createElement('div');
        bubble.className='dv-existing-comment';bubble.textContent=sn.text;
        bubble.onclick=e=>{e.stopPropagation();openComment(row,key,notes);};
        row.appendChild(bubble);
      }

    });
    div.appendChild(sentsEl);directorView.appendChild(div);
  });

}

function openComment(rowEl,key,notes){
  if(rowEl.querySelector('.dv-comment-input'))return;
  const sn=notes[`sent_${key}`]||{};
  const inp=document.createElement('textarea');
  inp.className='dv-comment-input';inp.value=sn.text||'';
  inp.placeholder='Write a note for this sentence…';inp.rows=2;

function highlightDirector(){
  if(uiMode!=='director')return;
  const{startChar,endChar}=getHighlightRange();
  let first=null;
  // Re-render sentence DOM only when range changes — not every 60fps previewTick frame
  if(startChar!==_dvPrevStart){
    _dvPrevStart=startChar;
    directorView.querySelectorAll('.dv-sentence-row').forEach(row=>{
      const s=parseInt(row.dataset.start),e=parseInt(row.dataset.end),raw=row.dataset.raw||'';
      const textEl=row.querySelector('.dv-sent-text');
      const overlaps=!(e<=startChar||s>=endChar);
      textEl.innerHTML=overlaps?richHtml(raw,s,markList(),startChar,endChar):richHtml(raw,s,markList());
      if(overlaps&&!first)first=row;
    });
  } else {
    first=directorView.querySelector('mark.dv-hl')?.closest('.dv-sentence-row')||null;
  }
  // Auto-scroll ONLY when the highlighted row itself changes (reading progressed).
  // Same row = user is manually scrolling — don't interfere.
  const dvRect=directorView.getBoundingClientRect();
  if(first){
    const rRect=first.getBoundingClientRect();
    const relTop=rRect.top-dvRect.top;
    const relBot=rRect.bottom-dvRect.top;
    const dvH=directorView.clientHeight;
    if(first!==_dvLastRow){
      _dvLastRow=first;
      // New row highlighted (reading progressed)
      if(relBot>dvH*0.75 || relTop>dvH || relBot<0){
        // Downward page-turn or off-screen rescue: put near top
        directorView.scrollTop=Math.max(0, relTop+directorView.scrollTop-28);
      } else if(relTop>=0 && relTop<dvH*0.2){
        // New row appeared in top 20%: put near bottom (80%)
        directorView.scrollTop=Math.max(0, relTop+directorView.scrollTop-dvH*0.8+rRect.height/2);
      }
    } else {
      // Same row (user scrolling) — upward trigger only: row drifting into top 20%
      if(relBot>0 && relBot<dvH*0.2){
        directorView.scrollTop=Math.max(0, relTop+directorView.scrollTop-dvH*0.8+rRect.height/2);
      }
    }
  }
}

function exportWithNotes(){
  const scr=getActiveScript(),notes=getNotesFor(scr.id);
  let md=scr.text;
  const secs=getParagraphs(scr.text);
  const hasNotes=Object.keys(notes).some(k=>k.startsWith('sent_')&&notes[k].text);

}

// ── PREVIEW & SCROLL ──────────────────────────────────────
let scrollPct=0,phone={w:390,h:844},previewScale=1,previewPxPerWord=0,phonePadY=0.6*844;

let peer=null,conn=null,peerCode=generateCode();

function generateCode(){return Math.floor(100000+Math.random()*900000).toString();}
function updateMonitorScale(){
  const cs=getComputedStyle(sidePane);
  const avail=sidePane.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  const ratio=phone.w/phone.h;let h=Math.min(260,avail/ratio),w=h*ratio;
  if(w>avail){w=avail;h=w/ratio;}
  monitor.style.width=w+'px';monitor.style.height=h+'px';
  previewScale=phone.w>0?w/phone.w:1;
  previewText.style.fontSize=(state.fontSize*previewScale)+'px';
  // Mirror the prompter's vertical lead-in (60vh on the phone) at scale,
  // instead of the preview's own container-relative padding.
  previewText.style.paddingTop=(phonePadY*previewScale)+'px';
  previewText.style.paddingBottom=(phonePadY*previewScale)+'px';
  computePreviewPxPerWord();
}
// Preview's own pixels-per-word — used only for the disconnected fallback scroll.
function computePreviewPxPerWord(){
  const words=(state.text.trim().match(/\S+/g)||[]).length;
  if(!words){previewPxPerWord=0;return;}
  const cs=getComputedStyle(previewText);
  const padTop=parseFloat(cs.paddingTop)||0,padBot=parseFloat(cs.paddingBottom)||0;
  const textH=Math.max(0,previewText.scrollHeight-padTop-padBot);
  previewPxPerWord=textH/words;

// When prompter sends scroll updates, track the last sync time.
// previewTick only scrolls independently when no recent sync (e.g. disconnected).
let lastSyncTime=0;
function previewTick(ts){
  if(state.playState==='playing'&&!draggingPreview){
    const sinceSync=Date.now()-lastSyncTime;
    if(sinceSync>300){
      // No prompter sync recently — scroll independently as fallback
      if(prevLast!==null){const dt=(ts-prevLast)/1000;const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);const pxs=previewPxPerWord>0?state.wpm/60*previewPxPerWord:0;previewPos=Math.max(0,Math.min(previewPos+pxs*dt,max));previewBox.scrollTop=previewPos;}
    }
    prevLast=ts;
  }else{prevLast=null;}
  requestAnimationFrame(previewTick);
}
requestAnimationFrame(previewTick);
function correctPreview(pct){
  const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);
  previewPos=pct*max; // Direct set — no smoothing, no fighting with previewTick
  previewBox.scrollTop=previewPos;
  lastSyncTime=Date.now();
}
const WS=0.6;
function scrubPx(dpx){
  const max=Math.max(0,previewText.scrollHeight-previewBox.clientHeight);if(!max)return;
  previewPos=Math.max(0,Math.min(previewPos+dpx,max));previewBox.scrollTop=previewPos;
  scrollPct=previewPos/max;sendUpdate('seek',scrollPct);renderHighlight();updateScrubber();
  if(uiMode==='editor'){
    const{startChar}=getHighlightRange();const total=state.text.length||1;
    const targetTop=(startChar/total)*textArea.scrollHeight;
    const margin=80;
    // Only auto-scroll when highlight drifts near the edge of the visible area
    if(targetTop<textArea.scrollTop+margin||targetTop>textArea.scrollTop+textArea.clientHeight-margin){
      textArea.scrollTop=Math.max(0,targetTop-textArea.clientHeight*0.35);

    }
  } else highlightDirector();
}
let prevDragY=0;
previewBox.addEventListener('pointerdown',e=>{draggingPreview=true;prevDragY=e.clientY;previewBox.setPointerCapture(e.pointerId);previewBox.classList.add('dragging');});
previewBox.addEventListener('pointermove',e=>{if(!draggingPreview)return;scrubPx(-(e.clientY-prevDragY));prevDragY=e.clientY;});
const endPD=()=>{draggingPreview=false;previewBox.classList.remove('dragging');};
previewBox.addEventListener('pointerup',endPD);previewBox.addEventListener('pointercancel',endPD);
previewBox.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});

// ── DOM-BASED HIGHLIGHT ───────────────────────────────────
// Preview may contain <u> spans, so the script is spread across many text nodes.
// These walk all of them, mapping carets ↔ global character offsets.
function previewTextNodes(){const a=[];const w=document.createTreeWalker(previewText,NodeFilter.SHOW_TEXT,null);let n;while((n=w.nextNode()))a.push(n);return a;}
function caretToOffset(container,off){

  let g=0;for(const n of previewTextNodes()){if(n===container)return g+off;g+=n.nodeValue.length;}
  return g;
}
function caretAt(x,y){

  else if(document.caretPositionFromPoint){const p=document.caretPositionFromPoint(x,y);if(p)return caretToOffset(p.offsetNode,p.offset);}
  return null;
}
function offsetToPreviewPoint(offset){

  return last?{node:last,offset:last.nodeValue.length}:null;
}
function getHighlightRange(){
  const text=state.text;
  if(!text.length)return{startChar:0,endChar:0};
  const rect=previewBox.getBoundingClientRect();
  if(!rect.width||!rect.height)return{startChar:0,endChar:0};
  const x=rect.left+2;
  let s=caretAt(x,rect.top+1),e=caretAt(x,rect.bottom-1);
  if(s==null)s=0;if(e==null)e=text.length;if(e<s){const t=s;s=e;e=t;}
  while(s>0&&/\S/.test(text[s-1])&&/\S/.test(text[s]))s--;

}
function scrollPctFromChar(ci){

  if(!total||!max)return 0;ci=Math.max(0,Math.min(ci,total-1));
  const p=offsetToPreviewPoint(ci);if(!p)return scrollPct;
  const range=document.createRange();range.setStart(p.node,p.offset);range.setEnd(p.node,Math.min(p.offset+1,p.node.nodeValue.length));
  let rects=range.getClientRects();
  if(!rects.length){const p2=offsetToPreviewPoint(ci+1);if(p2){range.setEnd(p2.node,p2.offset);rects=range.getClientRects();}}
  if(!rects.length)return scrollPct;
  const br=previewBox.getBoundingClientRect();
  return Math.max(0,Math.min(1,((rects[0].top-br.top)+previewBox.scrollTop)/max));
}
// Seek so a jumped-to line sits ~40% down from the top (closer to centre), not at the very top.
const START_LINE_FRAC=0.1;
function lineSeekPct(charOffset){
  // Advance past leading whitespace/newlines so we target the line holding the
  // first actual WORD, not the (often blank) line above it.
  const txt=state.text;
  while(charOffset<txt.length && /\s/.test(txt[charOffset])) charOffset++;
  const pct=scrollPctFromChar(charOffset);
  const max=Math.max(1,previewText.scrollHeight-previewBox.clientHeight);
  return Math.max(0,pct-(previewBox.clientHeight*START_LINE_FRAC)/max);
}
function renderHighlight(){
  if(uiMode==='director'){highlightDirector();return;}
  const text=state.text,{startChar,endChar}=getHighlightRange();
  highlightLayer.innerHTML=escHtml(text.slice(0,startChar))+(startChar<endChar?'<span class="highlight-span">'+escHtml(text.slice(startChar,endChar))+'</span>':'')+escHtml(text.slice(endChar));
  highlightLayer.scrollTop=textArea.scrollTop;
}
textArea.addEventListener('scroll',()=>{highlightLayer.scrollTop=textArea.scrollTop;});
textArea.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});
directorView.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});


// ── SCRUBBER ──────────────────────────────────────────────
function thumbGeo(){
  const h=scrubberTrack.clientHeight;
  // Size = visible fraction of content in the preview
  const totalH=Math.max(1,previewText.scrollHeight);
  const visF=Math.min(1,previewBox.clientHeight/totalH);
  const size=Math.max(24,visF*h);
  // Position = direct linear mapping of scrollPct
  const top=scrollPct*Math.max(0,h-size);
  return{h,size,top};
}
function updateScrubber(){const{size,top}=thumbGeo();scrubberThumb.style.height=size+'px';scrubberThumb.style.top=Math.max(0,top)+'px';}
function seekThumb(tt){
  const{h,size}=thumbGeo();
  tt=Math.max(0,Math.min(tt,h-size));
  // Direct linear: thumb position → scroll percentage. No DOM measurement.
  const pct=h>size?tt/(h-size):0;
  scrollPct=pct;sendUpdate('seek',pct);correctPreview(pct);renderHighlight();updateScrubber();
  if(uiMode==='editor'){
    const targetTop=pct*textArea.scrollHeight;
    textArea.scrollTop=targetTop;highlightLayer.scrollTop=targetTop;
  } else highlightDirector();
}
scrubberThumb.addEventListener('pointerdown',e=>{e.preventDefault();draggingScrubber=true;const{top}=thumbGeo();dragScrubOff=e.clientY-scrubberTrack.getBoundingClientRect().top-top;scrubberThumb.setPointerCapture(e.pointerId);});
scrubberThumb.addEventListener('pointermove',e=>{if(!draggingScrubber)return;seekThumb(e.clientY-scrubberTrack.getBoundingClientRect().top-dragScrubOff);});
scrubberThumb.addEventListener('pointerup',()=>{draggingScrubber=false;});
scrubberThumb.addEventListener('pointercancel',()=>{draggingScrubber=false;});
scrubberTrack.addEventListener('pointerdown',e=>{if(e.target===scrubberThumb)return;const{size}=thumbGeo();seekThumb(e.clientY-scrubberTrack.getBoundingClientRect().top-size/2);});
scrubberTrack.addEventListener('wheel',e=>{e.preventDefault();scrubPx(e.deltaY*WS);},{passive:false});

// ── OUTGOING ──────────────────────────────────────────────
function sendUpdate(f,v){if(conn&&conn.open)conn.send({type:'update',field:f,value:v});}
playBtn.onclick=()=>{
  const v=state.playState==='playing'?'paused':'playing';
  state.playState=v;
  playBtn.textContent=v==='playing'?'Pause':'Play';
  playBtn.classList.toggle('active',v==='playing');
  sendUpdate('playState',v);
};
resetBtn.onclick=()=>{sendUpdate('reset',true);scrollPct=0;previewPos=0;previewBox.scrollTop=0;sentenceIdx=0;renderHighlight();updateScrubber();};
// Director toolbar
const sectionPauseBtn=$('sectionPauseBtn'),loopBtn=$('loopBtn'),directorToolsEl=$('directorTools'),editAllBtn=$('editAllBtn');
editAllBtn.onclick=()=>toggleEditAll();
sectionPauseBtn.onclick=()=>{
  sectionPauseMode=!sectionPauseMode;
  sectionPauseBtn.classList.toggle('dv-active',sectionPauseMode);
  loopBtn.disabled=!sectionPauseMode;
  if(!sectionPauseMode){loopMode=false;loopBtn.classList.remove('dv-active');loopBtn.style.opacity='';}
  directorView.classList.toggle('section-pause-on',sectionPauseMode);
  sendSectionBreaks();
};
loopBtn.onclick=()=>{
  if(!sectionPauseMode)return;
  loopMode=!loopMode;
  loopBtn.classList.toggle('dv-active',loopMode);
  sendSectionBreaks();
};
mirrorHBtn.onclick=()=>sendUpdate('mirroredH',!state.mirroredH);
mirrorVBtn.onclick=()=>sendUpdate('mirroredV',!state.mirroredV);
fontFamilySelect.onchange=()=>sendUpdate('fontFamily',fontFamilySelect.value);
const sf=d=>{const v=Math.max(20,Math.min(200,+fontSizeSlider.value+d));fontSizeSlider.value=v;fontSizeValue.textContent=v+'px';state.fontSize=v;updateMonitorScale();correctPreview(scrollPct);renderHighlight();sendUpdate('fontSize',v);updateReadTime();};
const ss=d=>{const v=Math.max(WPM_MIN,Math.min(WPM_MAX,+speedSlider.value+d));speedSlider.value=v;speedValue.textContent=v+' wpm';state.wpm=v;sendUpdate('wpm',v);updateReadTime();};
fontIncBtn.onclick=()=>sf(2);fontDecBtn.onclick=()=>sf(-2);
speedIncBtn.onclick=()=>ss(1);speedDecBtn.onclick=()=>ss(-1);
fontSizeSlider.oninput=()=>{const v=+fontSizeSlider.value;fontSizeValue.textContent=v+'px';state.fontSize=v;updateMonitorScale();correctPreview(scrollPct);renderHighlight();sendUpdate('fontSize',v);updateReadTime();};
speedSlider.oninput=()=>{speedValue.textContent=speedSlider.value+' wpm';state.wpm=+speedSlider.value;sendUpdate('wpm',+speedSlider.value);updateReadTime();};
const lhStep=d=>{const v=Math.round((Math.max(1,Math.min(2.5,(+lineHeightSlider.value)+d)))*10)/10;lineHeightSlider.value=v;lineHeightValue.textContent=v.toFixed(1);state.lineHeight=v;previewText.style.lineHeight=v;computePreviewPxPerWord();correctPreview(scrollPct);renderHighlight();updateScrubber();sendUpdate('lineHeight',v);};
lineHeightIncBtn.onclick=()=>lhStep(0.1);lineHeightDecBtn.onclick=()=>lhStep(-0.1);
lineHeightSlider.oninput=()=>{const v=+lineHeightSlider.value;lineHeightValue.textContent=v.toFixed(1);state.lineHeight=v;previewText.style.lineHeight=v;computePreviewPxPerWord();correctPreview(scrollPct);renderHighlight();updateScrubber();sendUpdate('lineHeight',v);};

// ── DUAL MARGIN SLIDER (left & right, each 0–20%) ──
function updateMarginUI(l,r){
  marginValue.textContent='L '+l+' · R '+r;
  const w=marginDual.clientWidth||1;
  const lx=(l/100)*w, rx=w-(r/100)*w;
  mdThumbL.style.left=lx+'px';
  mdThumbR.style.left=rx+'px';
  mdFill.style.left=lx+'px';
  mdFill.style.width=Math.max(0,rx-lx)+'px';
}
let mdDrag=null;
function mdApply(side,v){
  v=Math.max(MARGIN_MIN,Math.min(MARGIN_MAX,Math.round(v)));
  if(side==='L'){state.marginL=v;previewText.style.paddingLeft=v+'%';sendUpdate('marginL',v);}
  else{state.marginR=v;previewText.style.paddingRight=v+'%';sendUpdate('marginR',v);}
  updateMarginUI(state.marginL,state.marginR);computePreviewPxPerWord();correctPreview(scrollPct);renderHighlight();updateScrubber();
}
function mdMove(e){
  if(!mdDrag)return;
  const rect=marginDual.getBoundingClientRect();const w=rect.width||1;
  const x=Math.max(0,Math.min(e.clientX-rect.left,w));
  if(mdDrag==='L')mdApply('L',(x/w)*100);
  else mdApply('R',((w-x)/w)*100);
}
mdThumbL.addEventListener('pointerdown',e=>{e.preventDefault();mdDrag='L';mdThumbL.setPointerCapture(e.pointerId);});
mdThumbR.addEventListener('pointerdown',e=>{e.preventDefault();mdDrag='R';mdThumbR.setPointerCapture(e.pointerId);});
mdThumbL.addEventListener('pointermove',mdMove);
mdThumbR.addEventListener('pointermove',mdMove);
const mdEnd=()=>{mdDrag=null;};
mdThumbL.addEventListener('pointerup',mdEnd);mdThumbR.addEventListener('pointerup',mdEnd);
mdThumbL.addEventListener('pointercancel',mdEnd);mdThumbR.addEventListener('pointercancel',mdEnd);

// ── COLLAPSIBLE TEXT SETTINGS ──
const textToggle=$('textToggle'),textSettings=$('textSettings'),textChevron=$('textChevron');
function setTextCollapsed(c){
  textSettings.classList.toggle('collapsed',c);
  textChevron.textContent=c?'▸':'▾';
  if(!c)updateMarginUI(state.marginL,state.marginR); // thumbs need a laid-out width
  try{localStorage.setItem('tp_text_collapsed',c?'1':'0');}catch(e){}
}
textToggle.onclick=()=>setTextCollapsed(!textSettings.classList.contains('collapsed'));
try{if(localStorage.getItem('tp_text_collapsed')==='1')setTextCollapsed(true);}catch(e){}

// Hidden textarea is now only an internal buffer; editing happens inline in Direct mode.
textArea.oninput=()=>{ applyTextChange(textArea.value); };
undoBtn.onclick=()=>{textArea.focus();document.execCommand('undo');};
redoBtn.onclick=()=>{textArea.focus();document.execCommand('redo');};
copyBtn.onclick=async()=>{try{await navigator.clipboard.writeText(state.text);const o=copyBtn.textContent;copyBtn.textContent='Copied';setTimeout(()=>{copyBtn.textContent=o;},1200);}catch(e){copyBtn.textContent='Failed';setTimeout(()=>{copyBtn.textContent='Copy';},1200);}};
exportBtn.onclick=exportWithNotes;

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const inAnyInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  const inEditor=document.activeElement===textArea;
  if((e.code==='Space'||e.key===' ')&&!inAnyInput){e.preventDefault();
    const v=state.playState==='playing'?'paused':'playing';
    state.playState=v;playBtn.textContent=v==='playing'?'Pause':'Play';
    playBtn.classList.toggle('active',v==='playing');sendUpdate('playState',v);return;}
  if(!inEditor&&(e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='z'){textArea.focus();document.execCommand('redo');textArea.blur();return;}
  if((e.key==='ArrowUp'||e.key==='ArrowDown')&&!inAnyInput){e.preventDefault();jumpToSentence(e.key==='ArrowDown'?sentenceIdx+1:sentenceIdx-1);}
});

// ── SECTION PAUSE / LOOP ─────────────────────────────────
// Sends sentence marker end offsets to prompter
function sendSentenceMarkers(){
  if(!conn||!conn.open)return;
  conn.send({type:'update',field:'sentenceMarkers',value:getActiveScript().markers||[]});
}

// Sends section boundary offsets to prompter so IT handles detection accurately
let sectionPauseMode=false,loopMode=false;
function sendSectionBreaks(){
  if(!conn||!conn.open)return;
  try{
    const breaks=sectionPauseMode?getParagraphs(state.text)
      .filter(sec=>sec.sentences&&sec.sentences.length>0)
      .map(sec=>({
        endOffset:sec.sentences[sec.sentences.length-1].offset+sec.sentences[sec.sentences.length-1].len,
        startOffset:sec.sentences[0].offset
      })):[];
    conn.send({type:'update',field:'sectionBreaks',value:breaks});
    conn.send({type:'update',field:'loopMode',value:loopMode});
  }catch(e){console.warn('sendSectionBreaks:',e);}
}


// ── MARKERS — detection handled by prompter; control only sends offsets ──

// ── READ TIME ─────────────────────────────────────────────
function updateReadTime(){
  if(!readTimeEl)return;
  const words=state.text.trim().split(/\s+/).filter(Boolean).length;
  if(!words){readTimeEl.textContent='';return;}
  const secs=state.wpm>0?Math.round(words/state.wpm*60):0;
  if(secs>0){
    const m=Math.floor(secs/60),s=secs%60;
    readTimeEl.textContent=words+'w · ~'+m+':'+s.toString().padStart(2,'0');
  }else{
    readTimeEl.textContent=words+'w';
  }
}

// ── INCOMING ──────────────────────────────────────────────
function handleData(msg){
  if(msg.type==='state'){state={...state,...msg.data,text:state.text};sentenceStarts=buildSentenceStarts(state.text);renderControls();}
  else if(msg.type==='scroll'){
    const prevPct=scrollPct;
    scrollPct=msg.position;
    // (sentence marker auto-pause handled by prompter)

    if(!draggingPreview)correctPreview(scrollPct);renderHighlight();updateScrubber();
  }
  else if(msg.type==='viewport'){phone={w:msg.width,h:msg.height};if(msg.padY!=null)phonePadY=msg.padY;updateMonitorScale();}
}
window.addEventListener('resize',()=>{updateMonitorScale();updateScrubber();updateMarginUI(state.marginL,state.marginR);});

// ── QR MODAL ──────────────────────────────────────────────
function buildPrompterUrl(c){const dir=window.location.pathname.replace(/\/[^/]*$/,'/');return window.location.origin+dir+'prompter.html?code='+c;}
function openQrModal(){
  qrModalCanvas.innerHTML='';
  try{new QRCode(qrModalCanvas,{text:buildPrompterUrl(peerCode),width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
  qrModalCode.textContent=peerCode;qrModal.style.display='flex';
}
persistentCode.onclick=openQrModal;
closeQrModal.onclick=()=>{qrModal.style.display='none';};
qrModal.addEventListener('pointerdown',e=>{if(e.target===qrModal)qrModal.style.display='none';});
dismissBanner.onclick=()=>reconnectBanner.classList.remove('visible');

// ── ENTER MAIN PANEL ──────────────────────────────────────
function enterMainPanel(){
  openingPanel.classList.add('hidden');
  document.body.insertBefore(tabBar,mainPanel);
  tabBar.classList.add('visible');mainPanel.classList.add('visible');
  persistentCode.textContent=peerCode;
  renderTabs();syncScript();textArea.value=state.text;
  sentenceStarts=buildSentenceStarts(state.text);
  setMode('director');                                   // 2.0: Direct is the only view
  renderControls();
  updateMonitorScale();updateScrubber();updateMarginUI(state.marginL,state.marginR);checkRestore();
  setTimeout(()=>{updateReadTime();sendSectionBreaks();sendSentenceMarkers();},120);
  // Send current script to prompter now that the session is chosen
  if(conn&&conn.open){
    const payload={type:'state',data:{...state,text:getActiveScript().text}};
    conn.send(payload);
    setTimeout(()=>{if(conn&&conn.open)conn.send(payload);},400);
  }
}
function renderQr(c){
  qrCanvas.innerHTML='';
  try{new QRCode(qrCanvas,{text:buildPrompterUrl(c),width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
}
function applyCode(c){
  peerCode=c;
  hostCode.textContent=c;
  bannerCode.textContent=c;
  persistentCode.textContent=c;
  renderQr(c);
  setConnStatus('conn-waiting','Waiting for prompter…');
}
function setPeerStatus(ready){
  const dot=document.getElementById('peerStatus');
  if(dot){dot.style.color=ready?'var(--accent)':'var(--muted)';dot.title=ready?'Signaling server: connected':'Signaling server: connecting…';}
}

newProjectBtn.onclick=()=>{session=defaultSession(true);enterMainPanel();};
loadProjectBtn.onclick=()=>fileInput.click();

// ── PEER — exact v4 structure ─────────────────────────────
const ICE_CONFIG = {
  config: { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' },
    { urls: 'turn:openrelay.metered.ca:80',                username:'openrelayproject', credential:'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443',               username:'openrelayproject', credential:'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' },
  ]}
};
function setConnStatus(cls, text){
  const el=$('connIndicator'),codeBox=$('codeBox');
  if(el){el.className=cls;}
  const ct=$('connText');if(ct)ct.textContent=text;
  if(codeBox)codeBox.classList.toggle('faded',cls==='conn-connected');
}
function startHost(){
  peer=new Peer('tp-'+peerCode, ICE_CONFIG);
  peer.on('open',()=>{
    applyCode(peerCode);
    setPeerStatus(true);
    });
  peer.on('connection',c=>{
    conn=c;
    conn.on('open',()=>{
      sideStatus.textContent='CONNECTED';{const cd=$('connDot');if(cd)cd.style.background='#22c55e';}
      reconnectBanner.classList.remove('visible');
      setConnStatus('conn-connected','Connected');
      syncScript();
      const payload={type:'state',data:{...state,text:getActiveScript().text}};
      conn.send(payload);
      setTimeout(()=>{if(conn&&conn.open){conn.send(payload);sendSectionBreaks();sendSentenceMarkers();}},400);
    });
    conn.on('data',handleData);
    conn.on('close',()=>{
      conn=null;
      sideStatus.textContent='DISCONNECTED';{const cd=$('connDot');if(cd)cd.style.background='#e55';}
      reconnectBanner.classList.add('visible');
      setConnStatus('conn-waiting','Waiting for prompter…');
    });
  });
  peer.on('error',err=>{
    setPeerStatus(false);
    if(err.type==='unavailable-id'){
      peerCode=generateCode();
      persistentCode.textContent=peerCode;
      peer.destroy();startHost();
    }else{
      setConnStatus('conn-error','Error: '+err.type);
      console.warn('PeerJS error:',err.type);
    }
  });
}
// newCodeBtn removed from UI
startHost();

// Watch for new connections when main panel is up (v4 reconnect pattern)
setInterval(()=>{
  if(peer&&!conn&&!peer.destroyed){
    peer.on('connection',c=>{
      conn=c;
      conn.on('open',()=>{
        sideStatus.textContent='CONNECTED';{const cd=$('connDot');if(cd)cd.style.background='#22c55e';}
        reconnectBanner.classList.remove('visible');
        setConnStatus('conn-connected','Connected');
        syncScript();
        const payload={type:'state',data:{...state,text:getActiveScript().text}};
        conn.send(payload);
        setTimeout(()=>{if(conn&&conn.open)conn.send(payload);},400);
      });
      conn.on('data',handleData);
      conn.on('close',()=>{conn=null;sideStatus.textContent='DISCONNECTED';{const cd=$('connDot');if(cd)cd.style.background='#e55';}reconnectBanner.classList.add('visible');setConnStatus('conn-waiting','Waiting for prompter…');});
    });
  }
},2000);
